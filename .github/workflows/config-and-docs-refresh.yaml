name: 'Config and Docs Refresh'

on:
  schedule:
    # Weekly on Mondays at 07:00 UTC (one hour after the compliance audit to spread load).
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target a single repo (optional, defaults to all non-fork non-archived).'
        required: false
        type: 'string'
      batch_size:
        description: 'Repos processed sequentially per matrix leg (defaults to 10).'
        required: false
        type: 'number'
        default: 10
      max_parallel:
        description: 'Concurrent matrix legs (defaults to 2 to halve wall-clock; raise carefully to stay within the Anthropic rate limit).'
        required: false
        type: 'number'
        default: 2
      max_turns:
        description: 'Max claude reasoning turns per repo (defaults to 50; raise if you see "Reached max turns" on a legitimately complex repo).'
        required: false
        type: 'number'
        default: 50

concurrency:
  group: 'config-and-docs-refresh'
  cancel-in-progress: false

jobs:
  discover:
    name: 'Enumerate and batch target repos'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
    env:
      HARDEN_OWNER: 'rios0rios0'
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      count: ${{ steps.build-matrix.outputs.count }}
    steps:
      - name: 'Checkout config-automation'
        uses: 'actions/checkout@v6'

      - name: 'Set up Go'
        uses: 'actions/setup-go@v6'
        with:
          go-version: '1.26'
          cache: true

      # Enumerates repos via `harden-repos --list-json` (or the single-repo
      # override), then chunks the sorted array into fixed-size batches so
      # the matrix has O(repos / batch_size) legs instead of one leg per
      # repo. Each leg loops through its batch internally --- trades a
      # little per-repo log isolation for a dramatically cleaner
      # pipeline-run UI as the org grows.
      - name: 'Build matrix'
        id: 'build-matrix'
        env:
          # CLAUDE_MD_REFRESH_TOKEN is the fine-grained PAT owned by this workflow.
          # Falls back to COMPLIANCE_AUDIT_TOKEN (shared read-only PAT) and finally to
          # the ephemeral GITHUB_TOKEN, which can access the current repo per its
          # permissions but generally cannot read metadata for other private repos.
          # Scoped to this step only so the PAT isn't exposed to checkout/setup steps.
          GH_TOKEN: ${{ secrets.CLAUDE_MD_REFRESH_TOKEN || secrets.COMPLIANCE_AUDIT_TOKEN || secrets.GITHUB_TOKEN }}
          REPO_INPUT: ${{ inputs.repo }}
          BATCH_SIZE: ${{ inputs.batch_size || 10 }}
        run: |
          set -euo pipefail
          # `inputs.batch_size` is a free-form workflow_dispatch value that
          # flows into `jq` as `range(0; length; $batchSize)`. A 0, negative,
          # or non-integer value would crash jq or produce an empty matrix,
          # so normalize to a positive integer (fall back to 10 otherwise).
          if ! [[ "${BATCH_SIZE}" =~ ^[1-9][0-9]*$ ]]; then
            echo "Warning: invalid batch_size='${BATCH_SIZE}', falling back to 10." >&2
            BATCH_SIZE=10
          fi
          if [ -n "${REPO_INPUT}" ]; then
            # Single-repo override for workflow_dispatch testing. Uses gh's
            # built-in `gh api` so we don't spin up the Go binary just to
            # fetch one default_branch.
            default_branch=$(gh api "/repos/${HARDEN_OWNER}/${REPO_INPUT}" --jq '.default_branch')
            repos=$(printf '[{"name":"%s","default_branch":"%s"}]' "${REPO_INPUT}" "${default_branch}")
          else
            repos=$(go run ./cmd/harden-repos --list-json)
          fi
          matrix=$(echo "${repos}" | jq -c --argjson batchSize "${BATCH_SIZE}" '
            . as $all
            | [range(0; length; $batchSize) as $i
               | {
                   name: ("batch_" + ((($i / $batchSize) + 1) | tostring | if length == 1 then "0" + . else . end)),
                   repos: $all[$i : $i + $batchSize]
                 }]')
          count=$(printf '%s' "${matrix}" | jq 'length')
          total=$(printf '%s' "${matrix}" | jq '[.[] | .repos | length] | add // 0')
          {
            echo "matrix=${matrix}"
            echo "count=${count}"
          } >> "${GITHUB_OUTPUT}"
          echo "Discovered ${total} target repo(s) across ${count} batch(es) of up to ${BATCH_SIZE}."
          echo "${matrix}" | jq '[.[] | {name, count: (.repos | length)}]'

  refresh:
    name: 'Refresh ${{ matrix.batch.name }}'
    needs: 'discover'
    if: ${{ needs.discover.outputs.count != '0' }}
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
    timeout-minutes: 240
    strategy:
      fail-fast: false
      # Each matrix leg handles up to `batch_size` repos sequentially; legs
      # themselves run in parallel up to `max_parallel`. The default of 2
      # halves wall-clock vs. fully serial while keeping the steady-state
      # request rate well inside the Anthropic per-minute budget. Raise
      # carefully --- a wider parallel burst chews through the per-minute
      # rate limit and amplifies the cost of the permission-denial loop
      # that each no-drift repo incurs.
      max-parallel: ${{ fromJSON(inputs.max_parallel || '2') }}
      matrix:
        batch: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - name: 'Checkout config-automation (for prompt)'
        uses: 'actions/checkout@v6'

      - name: 'Install Node.js 20'
        uses: 'actions/setup-node@v6'
        with:
          node-version: '20.x'

      - name: 'Install Claude Code CLI'
        run: 'npm install -g @anthropic-ai/claude-code'

      # Tool allowlist locked down to exactly what the refresh prompt
      # needs: read the repo, and edit/create the two guidance files plus
      # the CHANGELOG (so Claude can record what it changed, per the prompt
      # rule). Without this allowlist, telemetry showed ~30 `permission_denials_count`
      # per run because the CLI probes many tools but the default harness
      # denies most of them, which burned turns and API spend on every
      # no-drift no-op. See `scripts/refresh_config_and_docs_prompt.md`
      # for the rule that matches this allowlist. `--max-turns 30` bounds
      # each repo invocation so a stuck reasoning loop cannot chew through
      # the whole job-timeout budget.
      - name: 'Process batch ${{ matrix.batch.name }}'
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_MD_REFRESH_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          HARDEN_OWNER: 'rios0rios0'
          REFRESH_BRANCH: 'chore/config-and-docs-refresh'
          REPOS: ${{ toJSON(matrix.batch.repos) }}
          MAX_TURNS: ${{ inputs.max_turns || '50' }}
        run: |
          set -euo pipefail
          git config --global user.name 'config-bot'
          git config --global user.email 'config-bot@users.noreply.github.com'

          PROMPT_CONTENT="$(cat "${GITHUB_WORKSPACE}/scripts/refresh_config_and_docs_prompt.md")"
          WORK_DIR="$(mktemp -d)"
          CLAUDE_LOG="${WORK_DIR}/.claude.log"
          failed=()
          prs_created=()
          prs_updated=()
          no_drift=()
          quota_skipped=()
          quota_hit=0

          total=$(echo "${REPOS}" | jq 'length')
          idx=0
          # Process substitution (not a pipe) so array mutations persist
          # outside the loop body.
          while IFS= read -r repo_json; do
            idx=$((idx + 1))
            repo_name=$(echo "${repo_json}" | jq -r '.name')
            default_branch=$(echo "${repo_json}" | jq -r '.default_branch')
            target_repo="${HARDEN_OWNER}/${repo_name}"
            target="${WORK_DIR}/${repo_name}"

            # If a previous iteration tripped the org's monthly Claude
            # usage limit, skip the rest of the batch --- subsequent claude
            # invocations will all fail with the same error and just burn
            # ~3min/repo. The summary still reports them so it's visible
            # which repos didn't get a chance.
            if [ "${quota_hit}" -eq 1 ]; then
              echo "=========== [${idx}/${total}] ${target_repo} (SKIPPED: monthly Claude usage limit hit earlier in batch) ==========="
              quota_skipped+=("${target_repo}")
              continue
            fi

            echo "=========== [${idx}/${total}] ${target_repo} ==========="
            rm -rf "${target}"

            if ! git clone --quiet \
                "https://x-access-token:${GH_TOKEN}@github.com/${target_repo}.git" \
                "${target}"; then
              failed+=("clone: ${target_repo}")
              continue
            fi

            if ! git -C "${target}" checkout --quiet "${default_branch}"; then
              failed+=("checkout: ${target_repo}")
              rm -rf "${target}"
              continue
            fi

            # `</dev/null` is load-bearing: without it `claude -p` inherits
            # the outer `while read` loop's stdin (the jq pipe) and consumes
            # the rest of the repo list, so the loop exits silently after
            # the first iteration with a misleading "Batch summary".
            #
            # Output is tee'd to ${CLAUDE_LOG} so we can classify the
            # failure: "monthly usage limit" hits the org's Claude
            # subscription cap, in which case retrying every remaining
            # repo just burns ~3min each into the same wall --- set
            # `quota_hit=1` so the loop top short-circuits.
            #
            # PIPESTATUS[0] holds the subshell's (claude's) exit code;
            # we explicitly do not want `tee`'s exit code, which is
            # almost always 0 and would mask claude failures.
            rm -f "${CLAUDE_LOG}"
            ( cd "${target}" && claude -p "${PROMPT_CONTENT}" \
                  --model 'claude-opus-4-6' \
                  --max-turns "${MAX_TURNS}" \
                  --allowedTools 'Read,Grep,Glob,Edit(/CLAUDE.md),Edit(/.github/copilot-instructions.md),Edit(/CHANGELOG.md),Write(/CLAUDE.md),Write(/.github/copilot-instructions.md),Write(/CHANGELOG.md)' </dev/null ) 2>&1 | tee "${CLAUDE_LOG}"
            claude_rc=${PIPESTATUS[0]}
            if [ "${claude_rc}" -ne 0 ]; then
              if grep -qF 'monthly usage limit' "${CLAUDE_LOG}"; then
                failed+=("claude-quota: ${target_repo}")
                quota_hit=1
              else
                failed+=("claude: ${target_repo}")
              fi
              rm -rf "${target}"
              continue
            fi

            # Drift detection. `git add -N` (intent-to-add) makes newly
            # created untracked files visible to `git diff`, so a brand-new
            # CLAUDE.md in a repo that lacked one counts as drift. `git
            # diff -w` ignores whitespace-only changes so cosmetic diffs
            # don't churn PRs. CHANGELOG.md is intentionally NOT part of
            # the drift gate: the prompt rule says Claude only touches
            # CHANGELOG when it also modifies a refresh-scope file, so
            # gating on the refresh-scope files alone correctly suppresses
            # spurious PRs from any stray CHANGELOG-only edits. Some repos
            # may legitimately have neither file in scope, so only diff
            # paths that exist after the refresh step and treat "no
            # in-scope files present" as no drift. Today the in-scope set
            # is the AI-assistant guidance files; extend `drift_paths` (and
            # the prompt) when adding diagrams or other refresh targets.
            drift_paths=()
            for path in CLAUDE.md .github/copilot-instructions.md; do
              if [ -f "${target}/${path}" ]; then
                drift_paths+=("${path}")
                git -C "${target}" add -N -- "${path}"
              fi
            done
            if [ "${#drift_paths[@]}" -eq 0 ]; then
              no_drift+=("${target_repo}")
              rm -rf "${target}"
              continue
            fi
            if git -C "${target}" diff --quiet -w -- "${drift_paths[@]}"; then
              no_drift+=("${target_repo}")
              rm -rf "${target}"
              continue
            fi

            # Idempotent branch: force-push updates the diff if a PR
            # already exists.
            git -C "${target}" checkout -B "${REFRESH_BRANCH}"
            [ -f "${target}/CLAUDE.md" ] && git -C "${target}" add CLAUDE.md
            [ -f "${target}/.github/copilot-instructions.md" ] && git -C "${target}" add .github/copilot-instructions.md
            [ -f "${target}/CHANGELOG.md" ] && git -C "${target}" add CHANGELOG.md
            git -C "${target}" add -u CLAUDE.md .github/copilot-instructions.md CHANGELOG.md 2>/dev/null || true

            if ! git -C "${target}" commit --quiet -m 'chore(refresh): refreshed configuration and documentation'; then
              failed+=("commit: ${target_repo}")
              rm -rf "${target}"
              continue
            fi

            if ! git -C "${target}" push --quiet --force --set-upstream origin "${REFRESH_BRANCH}"; then
              failed+=("push: ${target_repo}")
              rm -rf "${target}"
              continue
            fi

            # Filter by `--state open` because `gh pr view <branch>` matches
            # PRs in any state (including merged/closed). Without this filter,
            # a previously-merged PR for this branch causes the workflow to
            # log "already exists; force-push updated its diff" and skip
            # `gh pr create`, leaving the new commit stranded on a branch
            # with no open PR.
            existing_pr=$(gh pr list --repo "${target_repo}" --head "${REFRESH_BRANCH}" --state open --json number --jq '.[0].number // empty')
            if [ -n "${existing_pr}" ]; then
              echo "PR #${existing_pr} already exists; force-push updated its diff."
              prs_updated+=("${target_repo}#${existing_pr}")
            else
              if pr_url=$(gh pr create \
                  --repo "${target_repo}" \
                  --base "${default_branch}" \
                  --head "${REFRESH_BRANCH}" \
                  --title 'chore(refresh): refreshed configuration and documentation' \
                  --body $'Automated weekly refresh by `config-and-docs-refresh.yaml` in `rios0rios0/config-automation`.\n\nClaude Code reviewed the in-scope configuration and documentation files (currently `CLAUDE.md` and `.github/copilot-instructions.md`) against the current code, updated whichever drifted, and recorded the change in `CHANGELOG.md` (when the repo has one).\n\nReview the diff carefully --- this PR was generated by Claude Code and may contain inaccuracies.' 2>/dev/null); then
                echo "Created ${pr_url}"
                prs_created+=("${target_repo} (${pr_url})")
              else
                failed+=("pr-create: ${target_repo}")
              fi
            fi

            rm -rf "${target}"
          done < <(echo "${REPOS}" | jq -c '.[]')

          rm -rf "${WORK_DIR}"

          echo
          echo '==== Batch summary ===='
          echo "no_drift (${#no_drift[@]}): ${no_drift[*]:-}"
          echo "prs_created (${#prs_created[@]}): ${prs_created[*]:-}"
          echo "prs_updated (${#prs_updated[@]}): ${prs_updated[*]:-}"
          echo "quota_skipped (${#quota_skipped[@]}): ${quota_skipped[*]:-}"
          echo "failed (${#failed[@]}): ${failed[*]:-}"
          if [ "${#failed[@]}" -gt 0 ]; then
            exit 1
          fi
